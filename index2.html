<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>DYLAN Interrupteur</title>

<script src="https://cdn.jsdelivr.net/npm/nipplejs@0.9.1/dist/nipplejs.min.js"></script>

<style>

body{
    background:#111;
    color:white;
    text-align:center;
    font-family:Arial;
}

button{
    font-size:1.2em;
    padding:10px;
}

#zone{
    width:220px;
    height:120px;
    margin:40px auto;
    background:#333;
    border-radius:60px;
    position:relative;
}

/* bouton mobile neutre */
#switch{
    width:100px;
    height:100px;
    border-radius:50%;
    position:absolute;
    top:10px;
    left:10px;
    background:white;
    transition:0.3s;
}

/* position ON */
.on{
    left:110px !important;
}

#etat{
    font-size:2em;
}

</style>
</head>

<body>

<h1>Interrupteur Dylan</h1>

<button onclick="connect()">🔗 Connexion BLE</button>

<div id="zone">
<div id="switch"></div>
</div>

<div id="etat">OFF</div>

<script>

// =======================
// UUID BLE
// =======================
const SERVICE_UUID = '0526b6db-d860-413e-a5a9-828ddf2ceba6';
const COLOR_UUID   = '0526b6db-d861-413e-a5a9-828ddf2ceba6';
const BRIGHT_UUID  = '0526b6db-d861-413e-a5a9-828ddf2ceba6';

let device, server, colorChar, brightChar;
let state = false;


// =======================
// Connexion BLE
// =======================
async function connect(){

device = await navigator.bluetooth.requestDevice({
acceptAllDevices:true,
optionalServices:[SERVICE_UUID]
});

server = await device.gatt.connect();
const service = await server.getPrimaryService(SERVICE_UUID);

colorChar  = await service.getCharacteristic(COLOR_UUID);
brightChar = await service.getCharacteristic(BRIGHT_UUID);

alert("ESP32 connecté !");
}


// =======================
// Zone tactile NippleJS
// =======================
const joystick = nipplejs.create({
zone: document.getElementById('zone'),
mode:'static',
position:{left:'50%',top:'50%'},
color:'transparent'
});


// =======================
// Toggle interrupteur
// =======================
joystick.on('start', ()=>{

state = !state;

const sw = document.getElementById("switch");

if(state){

document.getElementById("etat").innerText="ON";
sw.classList.add("on");

/* LED ESP32 verte */
if(colorChar)
colorChar.writeValue(new Uint8Array([0,255,0]));

if(brightChar)
brightChar.writeValue(new Uint8Array([100]));

}else{

document.getElementById("etat").innerText="OFF";
sw.classList.remove("on");

/* LED ESP32 rouge */
if(colorChar)
colorChar.writeValue(new Uint8Array([255,0,0]));

if(brightChar)
brightChar.writeValue(new Uint8Array([100]));

}

});

</script>

</body>
</html>
